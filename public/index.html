<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reader Line</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">

      <div class="app__header">
        <h1>Reader Line</h1>
        <label class="toggle">
          <input type="checkbox" id="enabled" />
          <span class="toggle__track">
            <span class="toggle__thumb"></span>
          </span>
        </label>
      </div>

      <div class="form">

        <div class="form__row">
          <span class="form__label">Color</span>
          <input type="color" id="color" value="#000000" />
        </div>

        <div class="form__row">
          <span class="form__label">Opacity</span>
          <input type="range" id="opacity" min="0" max="1" step="0.01" value="0.15" />
          <span class="form__unit" id="opacity-value">15%</span>
        </div>

        <div class="form__row">
          <span class="form__label">Height</span>
          <input type="number" id="height" min="1" max="500" value="20" />
          <span class="form__unit">px</span>
        </div>

        <div class="form__row">
          <span class="form__label">Mode</span>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="mode" value="line" checked />
              Line
            </label>
            <label class="radio-option">
              <input type="radio" name="mode" value="focus" />
              Focus
            </label>
          </div>
        </div>

      </div>
    </div>
    <script src="scripts/constants.js"></script>
    <script src="scripts/storage.js"></script>
    <script src="popup-controller.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
